- type: reagent
  id: ForeverWeed
  name: reagent-name-forever-weed
  group: Narcotics
  desc: reagent-desc-forever-weed
  physicalDesc: reagent-physical-desc-syrupy
  flavor: bitter
  color: "#1b8b3d"
  contraband: Minor
  metabolisms:
    Narcotic:
      effects:
      - !type:AdjustReagent
        conditions:
        - !type:ReagentThreshold
          reagent: ForeverWeed
          max: 5
        reagent: ForeverWeed
        amount: 1
      - !type:GenericStatusEffect
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 1
        refresh: false
      - !type:PopupMessage
        type: Local
        messages:
          - "foreverweed-effect-longtime"
          - "foreverweed-effect-parents"
          - "foreverweed-effect-paranoia-one"
          - "foreverweed-effect-paranoia-two"
          - "foreverweed-effect-paranoia-three"
          - "foreverweed-effect-syndicate"
          - "foreverweed-effect-space-cops"
          - "foreverweed-effect-space-cops-paranoia"
          - "foreverweed-effect-captain"
          - "foreverweed-effect-captain-paranoia"
          - "foreverweed-effect-centcomm"
          - "foreverweed-effect-centcomm-paranoia"
        probability: 0.01

- type: reagent
  id: hyposucrosium
  name: reagent-name-hyposucrosium 
  group: Narcotics
  desc: reagent-desc-hyposucrosium 
  physicalDesc: reagent-physical-desc-heterogeneous
  flavor: sweet
  color: "#9c9c9c"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.2
      - !type:MovespeedModifier
        conditions:
        - !type:ReagentThreshold
          min: 10
        walkSpeedModifier: 0.95
        sprintSpeedModifier: 0.95
      - !type:PopupMessage
         visualType: Medium
         messages: ["ephedrine-effect-tight-pain", "ephedrine-effect-heart-pounds"]
         type: Local
         probability: 0.10
      - !type:AdjustReagent
         conditions:
         - !type:ReagentThreshold
           reagent: Sugar
           min: 0.01
         reagent: hyposucrosium # Self replicating while sugar's active in the system.
         amount: 0.5
