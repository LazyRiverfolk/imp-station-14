- type: reagent
  id: Astrotame
  name: reagent-name-astrotame
  group: Foods
  desc: reagent-desc-astrotame
  physicalDesc: reagent-physical-desc-sugary
  flavor: sweet
  color: aquamarine
  recognizable: true
  metabolisms:
    Food:
      effects:
      - !type:HealthChange
        probability: 0.5
        damage:
          types:
            Poison: -0.4 # Slightly higher healing than sugar, though now you have a 1% chance of getting genetic. (IMP)
      - !type:HealthChange
        probability: 0.01
        damage:
          groups:
            Genetic: 0.5

- type: reagent
  id: BbqSauce
  name: reagent-name-bbq-sauce
  group: Foods
  desc: reagent-desc-bbq-sauce
  physicalDesc: reagent-physical-desc-gloopy
  flavor: sweet
  color: darkred
  recognizable: true
  metabolisms:
    Food:
      effects:
      - !type:SatiateThirst #Can't use tomato juice; turns into Ketchup in the body. (IMP)
          factor: 2
      - !type:AdjustReagent
          reagent: Sugar
          amount: 0.5
          
- type: reagent
  id: Cornoil
  name: reagent-name-cornoil
  group: Foods
  desc: reagent-desc-cornoil
  physicalDesc: reagent-physical-desc-oily
  flavor: oily
  color: yellow
  recognizable: true
  metabolisms:
    Food:
      effects:
      - !type:SatiateHunger
        factor: 1.75
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 6
        probability: 0.1 # Oil makes you puke, but also sates you. (IMP)

- type: reagent
  id: Frostoil
  name: reagent-name-frostoil
  group: Foods
  desc: reagent-desc-frostoil
  physicalDesc: reagent-physical-desc-cold
  flavor: cold
  color: skyblue
  metabolisms:
    Food:
      effects:
      - !type:SatiateHunger
        factor: 1.75
      - !type:HealthChange
        probability: 0.6
        damage:
          types:
            Heat: -2
    Poison:
      effects:
        - !type:AdjustTemperature
          amount: -250 # thermal energy, not temp
        - !type:HealthChange
          conditions:
            - !type:ReagentThreshold
              min: 5
          damage:
            types:
              Cold: 2
        - !type:PopupMessage
          type: Local
          messages: [ "capsaicin-effect-light-burn" ]
          probability: 0.2 # Everything involving metabolism was added; TL;DR: It's the inverse of Capsaicin Oil. (IMP)

- type: reagent
  id: HorseradishSauce
